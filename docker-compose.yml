services:
  user-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: khadijah-user-frontend
    restart: always
    ports:
      - "8081:80"
    networks:
      - khadijah-network
    healthcheck:
      test:
        ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  khadijah-network:
    external: true
